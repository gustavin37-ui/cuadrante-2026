<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuadrante 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --text: #e8eaf2;
    --text-muted: #7880a0;
    --accent: #4e82ee;
    --accent2: #7c5cfc;
    --weekend-bg: rgba(255,120,50,0.15);
    --weekend-text: #ff7832;
    --header-h: 64px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  header { height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 20px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
  .logo { font-size: 18px; font-weight: 700; color: var(--text); }
  .logo span { color: var(--accent); }
  .controls { display: flex; align-items: center; gap: 12px; flex: 1; }
  select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 7px 12px; font-size: 14px; min-width: 180px; }

  .legend { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; flex-wrap: wrap; gap: 8px; font-size: 12px; }
  .legend-dot { width: 16px; height: 16px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }

  main { flex: 1; padding: 20px 24px 40px; overflow-x: auto; }
  .month-section { margin-bottom: 28px; }
  .month-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; text-transform: uppercase; font-weight: 700; color: var(--accent); }

  .cuadrante-table { border-collapse: collapse; width: 100%; min-width: 900px; font-family: 'DM Mono', monospace; font-size: 11px; table-layout: fixed; }
  .cuadrante-table th, .cuadrante-table td { border: 1px solid var(--border); text-align: center; vertical-align: middle; height: 38px; }
  
  .cuadrante-table th { background: var(--surface2); color: var(--text-muted); font-size: 9px; }
  .cuadrante-table th.worker-col { text-align: left; padding: 0 10px; width: 150px; background: var(--surface); }
  .cuadrante-table th.weekend-th { color: var(--weekend-text); background: rgba(255,120,50,0.05); }

  .cuadrante-table td.worker-name { text-align: left; padding: 0 10px; font-family: 'DM Sans'; font-weight: 600; background: var(--surface); position: sticky; left: 0; z-index: 2; }
  .cuadrante-table td.weekend-td { background: var(--weekend-bg) !important; }

  .cell-val { display: inline-block; padding: 2px 4px; border-radius: 4px; font-weight: 700; font-size: 10px; color: #fff; min-width: 24px; }
  
  .summary-bar { display: flex; flex-wrap: wrap; gap: 8px; padding: 14px 24px; background: var(--surface); border-top: 1px solid var(--border); margin-bottom: 10px; }
  .summary-item { display: flex; align-items: center; gap: 6px; background: var(--surface2); padding: 4px 8px; border-radius: 4px; font-size: 11px; }
  .summary-dot { width: 8px; height: 8px; border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">Cuadrante <span>2026</span></div>
  <div class="controls">
    <select id="worker-select"><option value="ALL">— Todos los trabajadores —</option></select>
    <select id="month-select"><option value="ALL">— Todos los meses —</option></select>
  </div>
</header>

<div class="legend">
  <div style="margin-right:10px; color:var(--text-muted)">LEYENDA:</div>
  <div style="display:flex; gap:15px; flex-wrap:wrap;">
    <div style="display:flex; align-items:center; gap:5px"><div class="legend-dot" style="background:#FFC000"></div> M7/M8/M9/TT</div>
    <div style="display:flex; align-items:center; gap:5px"><div class="legend-dot" style="background:#00B0F0"></div> Libranza</div>
    <div style="display:flex; align-items:center; gap:5px"><div class="legend-dot" style="background:#FF0000"></div> FSM</div>
    <div style="display:flex; align-items:center; gap:5px"><div class="legend-dot" style="background:#B4C6E7"></div> G. Justicia</div>
    <div style="display:flex; align-items:center; gap:5px"><div class="legend-dot" style="background:#F8CBAD"></div> G. Bomberos</div>
    <div style="display:flex; align-items:center; gap:5px"><div class="legend-dot" style="background:#ace887"></div> Localizados</div>
    <div style="display:flex; align-items:center; gap:5px"><div class="legend-dot" style="background:var(--weekend-text)"></div> Festivo / Finde</div>
  </div>
</div>

<div id="summary-bar" class="summary-bar" style="display:none"></div>

<main id="main-content">
  <div id="loading" style="text-align:center;padding:60px;color:var(--text-muted)">Cargando datos actualizados...</div>
</main>

<script>
// ==========================================
// CONFIGURACIÓN (RECUERDA TU URL)
// ==========================================
const GOOGLE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQvTClT2hzoA08AiisWiUeSnEFobH42SGKuv8ZLgERkVhUfYGLd3FvH6xXwCubBAaGIKWL6JrkOa1J8/pub?gid=0&single=true&output=csv"; 

const FESTIVOS_2026 = {
    "ENERO": [1, 6], "MARZO": [19], "ABRIL": [2, 3], "MAYO": [1, 15], 
    "AGOSTO": [15], "OCTUBRE": [12], "NOVIEMBRE": [9], "DICIEMBRE": [7, 8, 25]
};

const MONTHS_ORDER = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];

const MAPEO_TURNOS = {
  "1": { texto: "LOC", bg: "#ace887", color: "#000" }, 
  "3": { texto: "GB",  bg: "#F8CBAD", color: "#000" }, 
  "4": { texto: "GB",  bg: "#F8CBAD", color: "#000" }, 
  "5": { texto: "GBF", bg: "#F8CBAD", color: "#000" }, 
  "FSM": { texto: "FSM", bg: "#FF0000", color: "#fff" },
  "FSMF": { texto: "FSMF", bg: "#FF0000", color: "#fff" },
  "M7": { texto: "M7", bg: "#FFF2CC", color: "#000" }, 
  "M8": { texto: "M8", bg: "#FFE699", color: "#000" }, 
  "M9": { texto: "M9", bg: "#FFE699", color: "#000" }, 
  "TT": { texto: "TT", bg: "#FFC000", color: "#000" }, 
  "L": { texto: "L", bg: "#00B0F0", color: "#fff" }, 
  "G": { texto: "GJ", bg: "#B4C6E7", color: "#000" }, 
  "GF": { texto: "GJ", bg: "#B4C6E7", color: "#000" }, 
  "GFF": { texto: "GJF", bg: "#B4C6E7", color: "#000" }, 
  "V": { texto: "V", bg: "#92D050", color: "#000" }, 
  "VC": { texto: "VC", bg: "#548235", color: "#fff" }, 
  "B": { texto: "BAJA", bg: "#595959", color: "#fff" },
  "P": { texto: "P", bg: "#A6A6A6", color: "#000" }
};

let DATA = null;

// ==========================================
// CARGA DE DATOS
// ==========================================
fetch(GOOGLE_CSV_URL)
  .then(res => res.text())
  .then(csv => {
      let lineas = csv.split('\n').filter(l => l.trim() !== '');
      let u = lineas[lineas.length - 1];
      let i = u.indexOf('{'), f = u.lastIndexOf('}');
      if (i === -1) throw "Error JSON";
      DATA = JSON.parse(u.substring(i, f + 1).replace(/""/g, '"'));
      init();
  })
  .catch(e => document.getElementById('loading').innerText = "Error al conectar con los datos.");

function init() {
    const ws = document.getElementById('worker-select');
    const ms = document.getElementById('month-select');
    DATA.p.forEach(p => { let o = document.createElement('option'); o.value = p; o.textContent = p; ws.appendChild(o); });
    MONTHS_ORDER.forEach(m => { let o = document.createElement('option'); o.value = m; o.textContent = m; ms.appendChild(o); });
    ws.onchange = ms.onchange = render;
    render();
}

function getDia(ab) {
    return {'lu':'LUN','ma':'MAR','mi':'MIE','ju':'JUE','vi':'VIE','sá':'SAB','do':'DOM'}[ab.toLowerCase().replace('.','')] || ab;
}

function render() {
  const selW = document.getElementById('worker-select').value;
  const selM = document.getElementById('month-select').value;
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  const months = selM === 'ALL' ? MONTHS_ORDER : [selM];
  
  months.forEach(mName => {
    const m = DATA.m[mName];
    if (!m) return;

    const div = document.createElement('div');
    div.className = 'month-section';
    div.innerHTML = `<div class="month-header">${mName}<div style="flex:1;height:1px;background:var(--border)"></div></div>`;

    const table = document.createElement('table');
    table.className = 'cuadrante-table';
    
    // Header
    let h = `<thead><tr><th class="worker-col">TRABAJADOR</th>`;
    m.d.forEach(d => {
      const isW = d.nm.includes('Sá') || d.nm.includes('Do') || (FESTIVOS_2026[mName] || []).includes(parseInt(d.n));
      h += `<th class="${isW ? 'weekend-th' : ''}"><div>${d.n}</div><div style="font-size:7px">${getDia(d.nm)}</div></th>`;
    });
    table.innerHTML = h + `</tr></thead>`;

    // Body
    const tbody = document.createElement('tbody');
    m.w.forEach(wObj => {
      if (selW !== 'ALL' && selW !== wObj.n) return;
      const tr = document.createElement('tr');
      let row = `<td class="worker-name">${wObj.n}</td>`;
      const shifts = wObj.s.split(',');
      shifts.forEach((s, idx) => {
        const d = m.d[idx];
        const isW = d && (d.nm.includes('Sá') || d.nm.includes('Do') || (FESTIVOS_2026[mName] || []).includes(parseInt(d.n)));
        let cell = s.trim();
        let config = MAPEO_TURNOS[cell.toUpperCase()];
        let content = config ? `<span class="cell-val" style="background:${config.bg};color:${config.color}">${config.texto}</span>` : cell;
        row += `<td class="${isW ? 'weekend-td' : ''}">${content}</td>`;
      });
      tr.innerHTML = row;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    div.appendChild(table);
    main.appendChild(div);
  });
}
</script>
</body>
</html>
