<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuadrante 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --text: #e8eaf2;
    --text-muted: #7880a0;
    --accent: #4e82ee;
    --weekend-bg: rgba(255,120,50,0.15);
    --weekend-text: #ff7832;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { height: 64px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 20px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
  .logo { font-size: 18px; font-weight: 700; color: var(--text); }
  .logo span { color: var(--accent); }
  .controls { display: flex; align-items: center; gap: 12px; flex: 1; }
  select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px 12px; font-size: 14px; min-width: 200px; outline: none; }

  .legend { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; flex-wrap: wrap; gap: 12px; font-size: 12px; align-items: center; }
  .legend-dot { width: 14px; height: 14px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.1); }

  main { padding: 20px 24px; overflow-x: auto; }
  .month-section { margin-bottom: 40px; }
  .month-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; text-transform: uppercase; font-weight: 700; color: var(--accent); font-size: 14px; }

  .cuadrante-table { border-collapse: collapse; width: 100%; min-width: 1000px; font-family: 'DM Mono', monospace; font-size: 11px; }
  .cuadrante-table th, .cuadrante-table td { border: 1px solid var(--border); text-align: center; vertical-align: middle; height: 40px; padding: 2px; }
  
  .cuadrante-table th { background: var(--surface2); color: var(--text-muted); font-size: 10px; }
  .cuadrante-table th.worker-col { text-align: left; padding: 0 12px; width: 160px; background: var(--surface); position: sticky; left: 0; z-index: 3; }
  .cuadrante-table th.weekend-th { color: var(--weekend-text); background: rgba(255,120,50,0.05); }

  .cuadrante-table td.worker-name { text-align: left; padding: 0 12px; font-family: 'DM Sans'; font-weight: 600; background: var(--surface); position: sticky; left: 0; z-index: 2; white-space: nowrap; }
  .cuadrante-table td.weekend-td { background: var(--weekend-bg) !important; }

  .summary-bar { display: flex; flex-wrap: wrap; gap: 8px; padding: 14px 24px; background: var(--surface2); border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); }
  .summary-item { display: flex; align-items: center; gap: 6px; padding: 4px 10px; font-size: 11px; }
  .summary-dot { width: 8px; height: 8px; border-radius: 50%; }
</style>
</head>
<body>

<header>
  <div class="logo">Cuadrante <span>2026</span></div>
  <div class="controls">
    <select id="worker-select"><option value="ALL">— Todos los trabajadores —</option></select>
    <select id="month-select"><option value="ALL">— Todos los meses —</option></select>
  </div>
</header>

<div class="legend">
  <span style="color:var(--text-muted)">LEYENDA:</span>
  <div style="display:flex; gap:15px; flex-wrap:wrap;">
    <div style="display:flex; align-items:center; gap:6px"><div class="legend-dot" style="background:#FFC000"></div> M7/M8/M9/TT</div>
    <div style="display:flex; align-items:center; gap:6px"><div class="legend-dot" style="background:#00B0F0"></div> Libranza</div>
    <div style="display:flex; align-items:center; gap:6px"><div class="legend-dot" style="background:#FF0000"></div> FSM</div>
    <div style="display:flex; align-items:center; gap:6px"><div class="legend-dot" style="background:#B4C6E7"></div> G. Justicia</div>
    <div style="display:flex; align-items:center; gap:6px"><div class="legend-dot" style="background:#F8CBAD"></div> G. Bomberos</div>
    <div style="display:flex; align-items:center; gap:6px"><div class="legend-dot" style="background:#ace887"></div> Localizados</div>
    <div style="display:flex; align-items:center; gap:6px"><div class="legend-dot" style="background:var(--weekend-text)"></div> Festivo / Finde</div>
  </div>
</div>

<main>
  <div id="summary-bar" class="summary-bar" style="display:none"></div>
  <div id="main-content">
    <div id="loading" style="text-align:center;padding:100px;color:var(--text-muted)">Conectando con el servidor de datos...</div>
  </div>
</main>

<script>
// ==========================================
// 1. CONFIGURACIÓN (RECUERDA PEGAR TU ENLACE)
// ==========================================
const GOOGLE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQvTClT2hzoA08AiisWiUeSnEFobH42SGKuv8ZLgERkVhUfYGLd3FvH6xXwCubBAaGIKWL6JrkOa1J8/pub?gid=0&single=true&output=csv";

const FESTIVOS_2026 = {
    "ENERO": [1, 6], "ABRIL": [2, 3], "MAYO": [1, 15], "OCTUBRE": [12], "NOVIEMBRE": [2, 9], "DICIEMBRE": [7, 8, 24, 25, 31]
};

const MONTHS_ORDER = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];

// EL DICCIONARIO ACTUALIZADO
const MAPEO_TURNOS = {
  "1": { texto: "LOCALIZADO", bg: "#ace887", color: "#000" }, 
  "LOC": { texto: "LOCALIZADO", bg: "#ace887", color: "#000" }, 
  "3": { texto: "Guardia Bomberos",  bg: "#F8CBAD", color: "#000" }, 
  "4": { texto: "Guardia Bomberos",  bg: "#F8CBAD", color: "#000" }, 
  "5": { texto: "Guardia Bomberos Festivo", bg: "#F8CBAD", color: "#000" }, 
  "FSM":     { texto: "FSM",     bg: "#FF0000", color: "#FFFFFF" },
  "FSMF":    { texto: "FSM FESTIVO",    bg: "#FF0000", color: "#FFFFFF" },
  "FSM112":  { texto: "FSM112",  bg: "#FF0000", color: "#FFFFFF" },
  "FSM112F": { texto: "FSM112 FESTIVO", bg: "#FF0000", color: "#FFFFFF" },
  "112M":    { texto: "LOC 112 MAÑANA",    bg: "#7a7979", color: "#000000" }, 
  "112T":    { texto: "LOC 112 TARDE",    bg: "#D9D9D9", color: "#000000" }, 
  "LOC112M": { texto: "LOC 112 MAÑANA", bg: "#7a7979", color: "#000000" }, 
  "LOC112T": { texto: "LOC 112 TARDE", bg: "#D9D9D9", color: "#000000" }, 
  "M7": { texto: "M7", bg: "#FFF2CC", color: "#000" }, 
  "M8": { texto: "M8", bg: "#FFE699", color: "#000" }, 
  "M9": { texto: "M9", bg: "#FFE699", color: "#000" }, 
  "TT": { texto: "TT", bg: "#FFC000", color: "#000" }, 
  "L": { texto: "L", bg: "#00B0F0", color: "#fff" }, 
  "G": { texto: "Guardia Justicia", bg: "#B4C6E7", color: "#000" }, 
  "GF": { texto: "Guardia Justicia", bg: "#B4C6E7", color: "#000" }, 
  "GFF": { texto: "Guardia Justicia Festivo", bg: "#B4C6E7", color: "#000" }, 
  "V": { texto: "V", bg: "#92D050", color: "#000" }, 
  "VC": { texto: "VC", bg: "#548235", color: "#fff" }, 
  "B": { texto: "BAJA", bg: "#595959", color: "#fff" },
  "AAPP":    { texto: "AAPP",    bg: "#A6A6A6", color: "#000000" },
  "P": { texto: "PERMISO", bg: "#A6A6A6", color: "#000" }
};

let DATA = null;

// ==========================================
// 2. CARGA DE DATOS
// ==========================================
if (window.location.protocol === 'file:') {
    document.getElementById('loading').innerHTML = '<div style="color:#ff7832; padding:20px; border:1px solid #ff7832; border-radius:8px;"><b>Aviso de seguridad:</b> Los navegadores bloquean la carga de datos desde archivos locales. Por favor, <b>sube este archivo a GitHub</b> para verlo funcionando.</div>';
} else {
    fetch(GOOGLE_CSV_URL)
      .then(res => res.text())
      .then(csv => {
          let lineas = csv.split('\n').filter(l => l.trim() !== '');
          let u = lineas[lineas.length - 1];
          let i = u.indexOf('{'), f = u.lastIndexOf('}');
          if (i === -1) throw "Error JSON";
          DATA = JSON.parse(u.substring(i, f + 1).replace(/""/g, '"'));
          init();
      })
      .catch(e => {
          document.getElementById('loading').innerText = "Error al conectar con los datos. Revisa la publicación de Google Sheets.";
          console.error(e);
      });
}

function init() {
    const ws = document.getElementById('worker-select');
    const ms = document.getElementById('month-select');
    DATA.p.sort().forEach(p => { let o = document.createElement('option'); o.value = p; o.textContent = p; ws.appendChild(o); });
    MONTHS_ORDER.forEach(m => { let o = document.createElement('option'); o.value = m; o.textContent = m; ms.appendChild(o); });
    ws.onchange = ms.onchange = render;
    render();
}

function getDia(ab) {
    const d = ab.toLowerCase().replace('.','').trim();
    const m = {'lu':'LUN','ma':'MAR','mi':'MIE','ju':'JUE','vi':'VIE','sá':'SAB','sa':'SAB','do':'DOM'};
    return m[d] || ab.toUpperCase();
}

function render() {
  const selW = document.getElementById('worker-select').value;
  const selM = document.getElementById('month-select').value;
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  if (selW !== 'ALL') renderSummary(selW, selM === 'ALL' ? MONTHS_ORDER : [selM]);
  else document.getElementById('summary-bar').style.display = 'none';

  const months = selM === 'ALL' ? MONTHS_ORDER : [selM];
  
  months.forEach(mName => {
    const m = DATA.m[mName];
    if (!m) return;

    const div = document.createElement('div');
    div.className = 'month-section';
    div.innerHTML = `<div class="month-header">${mName}<div style="flex:1;height:1px;background:var(--border)"></div></div>`;

    const table = document.createElement('table');
    table.className = 'cuadrante-table';
    
    // Header
    let h = `<thead><tr><th class="worker-col">TRABAJADOR</th>`;
    m.d.forEach(d => {
      const isW = d.nm.includes('Sá') || d.nm.includes('Sa') || d.nm.includes('Do') || (FESTIVOS_2026[mName] || []).includes(parseInt(d.n));
      h += `<th class="${isW ? 'weekend-th' : ''}"><div>${d.n}</div><div style="font-size:7px; opacity:0.6">${getDia(d.nm)}</div></th>`;
    });
    table.innerHTML = h + `</tr></thead>`;

    // Body
    const tbody = document.createElement('tbody');
    m.w.forEach(wObj => {
      if (selW !== 'ALL' && selW !== wObj.n) return;
      const tr = document.createElement('tr');
      let row = `<td class="worker-name">${wObj.n}</td>`;
      const shifts = wObj.s.split(',');
      
      shifts.forEach((s, idx) => {
        const d = m.d[idx];
        const isW = d && (d.nm.includes('Sá') || d.nm.includes('Sa') || d.nm.includes('Do') || (FESTIVOS_2026[mName] || []).includes(parseInt(d.n)));
        
        let cellContent = s.trim();
        let valKey = cellContent.toUpperCase();
        let config = MAPEO_TURNOS[valKey];
        
        // ESTILOS DE CELDA COMPLETA
        let tdClass = isW ? 'weekend-td' : '';
        let tdStyle = '';
        let textToShow = cellContent;

        if (config) {
            // Aplicamos el color al TD en lugar de a un span, con texto más pequeño para los largos
            tdStyle = `background-color: ${config.bg} !important; color: ${config.color} !important; font-weight: 700; font-size: 9px; line-height: 1.1;`;
            textToShow = config.texto;
        }

        row += `<td class="${tdClass}" style="${tdStyle}">${textToShow}</td>`;
      });
      tr.innerHTML = row;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    div.appendChild(table);
    main.appendChild(div);
  });
}

function renderSummary(worker, months) {
  const bar = document.getElementById('summary-bar');
  bar.style.display = 'flex';
  const counts = {};
  
  months.forEach(mName => {
    const m = DATA.m[mName];
    if (!m) return;
    const w = m.w.find(x => x.n === worker);
    if (!w) return;
    w.s.split(',').forEach(s => {
      if (!s.trim()) return;
      let val = s.trim().toUpperCase();
      let config = MAPEO_TURNOS[val];
      let key = config ? config.texto + '|' + config.bg : s + '|#7880a0';
      if (!counts[key]) counts[key] = { n: 0, val: key.split('|')[0], col: key.split('|')[1] };
      counts[key].n++;
    });
  });

  bar.innerHTML = `<span style="font-size:12px;font-weight:700;color:var(--text);margin-right:15px">RESUMEN ${worker}:</span>`;
  Object.values(counts).sort((a,b) => b.n - a.n).forEach(item => {
    const div = document.createElement('div');
    div.className = 'summary-item';
    div.innerHTML = `<div class="summary-dot" style="background:${item.col}"></div><span class="summary-label">${item.val}</span><span class="summary-count" style="margin-left:4px; font-weight:700">${item.n}</span>`;
    bar.appendChild(div);
  });
}
</script>
</body>
</html>
